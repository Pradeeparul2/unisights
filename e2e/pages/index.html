<!doctype html>
<html>
  <head>
    <title>Unisights Test Page</title>
  </head>
  <body>
    <button id="btn">Click</button>

    <script
      async
      data-insights-id="e2e-test"
      src="/dist/index.global.js"
      data-debug="true"
      id="unisights-script"
    ></script>

    <script>
      // No return statements allowed here
      try {
        const params = new URLSearchParams(window.location.search);
        const endpoint = params.get("endpoint");

        const scriptEl = document.getElementById("unisights-script");
        if (scriptEl && endpoint) {
          scriptEl.setAttribute("data-endpoint", endpoint);
          console.log("Set data-endpoint to:", endpoint);
        }
      } catch (e) {
        console.error("Config script error:", e);
      }
    </script>

    <script>
      // Click handler — also no stray return
      const btn = document.getElementById("btn");
      if (btn) {
        btn.onclick = () => {
          if (window.unisights?.log) {
            window.unisights.log("click_test", { data: "button_clicked" });
          } else {
            console.warn("unisights not available yet");
          }
        };
      }
    </script>
  </body>
</html>
