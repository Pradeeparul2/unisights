<!doctype html>
<html>
  <head>
    <title>Unisights Test Page</title>
  </head>
  <body>
    <button id="btn">Click</button>

    <script
      src="/dist/index.global.js"
      data-insights-id="e2e-test"
      data-debug="true"
      data-no-auto-init="true"
      id="unisights-script"
    ></script>

    <script>
      window.addEventListener("load", function () {
        try {
          const params = new URLSearchParams(window.location.search);
          const endpoint = params.get("endpoint");
          const encrypt = params.get("encrypt") === "true";

          if (endpoint && window.unisights) {
            window.unisights.init({
              endpoint: decodeURIComponent(endpoint),
              insightsId: "e2e-test",
              debug: true,
              encrypt: encrypt,
            });
          }
        } catch (e) {
          console.error("Init error:", e);
        }
      });
    </script>

    <script>
      const btn = document.getElementById("btn");
      if (btn) {
        btn.onclick = () => {
          if (window.unisights?.log) {
            window.unisights.log("click_test", { data: "button_clicked" });
          }
        };
      }
    </script>
  </body>
</html>
