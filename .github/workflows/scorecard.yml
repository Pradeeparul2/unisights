name: OpenSSF Scorecard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    steps:
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.3.1
